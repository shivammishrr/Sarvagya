version: "3.9"
services:
  app:
    build: .
    container_name: multi_agent_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - browser_tool
      - python_repl_tool
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  browser_tool:
    build: ./services/browser_tool
    container_name: browser_tool
    ports:
      - "8081:8081"
  python_repl_tool:
    build: ./services/python_repl_tool
    container_name: python_repl_tool
    ports:
      - "8082:8082"
